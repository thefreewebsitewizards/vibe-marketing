services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./plans:/app/plans
      - ../:/app/sister-projects
    environment:
      - SISTER_PROJECTS_DIR=/app/sister-projects
    restart: unless-stopped
    expose:
      - "8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
