name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Trigger Coolify build
        run: |
          RESPONSE=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "https://coolify.leadneedleai.com/api/v1/deploy?uuid=l0g48c8g4wsskc40co4kssc8")

          echo "Coolify response: $RESPONSE"

          # Verify we got a deployment back
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deps = data.get('deployments', [])
          if not deps:
              print('ERROR: No deployments in response')
              sys.exit(1)
          print(f'Triggered: {deps[0][\"deployment_uuid\"]}')
          "

      - name: Wait for build and health check
        run: |
          # Poll health endpoint until the new deployment is live
          MAX_ATTEMPTS=24
          POLL_INTERVAL=15

          echo "Waiting for deployment to complete..."
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            sleep $POLL_INTERVAL
            elapsed=$((attempt * POLL_INTERVAL))

            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "https://reelbot.leadneedleai.com/health" 2>/dev/null || echo "000")

            echo "[$elapsed s] Health: HTTP $HEALTH"

            if [ "$HEALTH" = "200" ]; then
              echo "Deploy verified — health check passed"
              exit 0
            fi
          done

          echo "Health check did not pass within $((MAX_ATTEMPTS * POLL_INTERVAL))s"
          exit 1
