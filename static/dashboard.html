<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelBot — Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
    line-height: 1.6; padding: 16px;
    max-width: 960px; margin: 0 auto;
  }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1 { font-size: 1.5rem; color: #f8fafc; }
  h2 { font-size: 1.15rem; color: #f8fafc; margin-bottom: 8px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .search-input {
    background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    color: #e2e8f0; padding: 6px 12px; font-size: 0.85rem; width: 200px;
  }
  .search-input::placeholder { color: #64748b; }

  .filter-select {
    background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    color: #e2e8f0; padding: 6px 10px; font-size: 0.85rem;
  }

  .stats {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat {
    background: #1e293b; border-radius: 6px; padding: 10px 16px;
    flex: 1; min-width: 100px; text-align: center;
  }
  .stat-value { font-size: 1.3rem; font-weight: 700; color: #f8fafc; }
  .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; }

  .category-section { margin-bottom: 20px; }
  .category-header {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none; padding: 8px 0;
    border-bottom: 1px solid #1e293b;
  }
  .category-header:hover { color: #f8fafc; }
  .category-toggle { color: #64748b; font-size: 0.85rem; }
  .category-badge {
    background: #334155; color: #94a3b8; padding: 2px 8px;
    border-radius: 10px; font-size: 0.75rem; font-weight: 600;
  }
  .category-plans { margin-top: 8px; }
  .category-plans.collapsed { display: none; }

  .plan-card {
    display: block; background: #1e293b; border-radius: 6px;
    padding: 12px 16px; margin-bottom: 8px;
    transition: background 0.15s; cursor: pointer; text-decoration: none; color: inherit;
  }
  .plan-card:hover { background: #263347; text-decoration: none; }
  .plan-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .plan-title { font-weight: 600; color: #f1f5f9; font-size: 0.95rem; }
  .plan-theme { color: #94a3b8; font-size: 0.8rem; font-style: italic; margin-top: 2px; }
  .plan-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; align-items: center; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.7rem; font-weight: 600; color: #fff;
  }
  .badge-review { background: #f59e0b; }
  .badge-approved { background: #22c55e; }
  .badge-in_progress { background: #3b82f6; }
  .badge-completed { background: #6b7280; }
  .badge-failed { background: #ef4444; }
  .badge-relevance { border: 1px solid #334155; background: transparent; }
  .badge-cost { background: #7c3aed; }
  .badge-route { background: #0891b2; }

  .plan-date { color: #64748b; font-size: 0.75rem; }
  .empty-state { color: #64748b; text-align: center; padding: 40px; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .header { flex-direction: column; align-items: flex-start; }
    .search-input { width: 100%; }
    .stat { min-width: 80px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>ReelBot</h1>
  </div>
  <div class="header-right">
    <input type="text" class="search-input" id="search" placeholder="Search plans..." oninput="filterPlans()">
    <select class="filter-select" id="statusFilter" onchange="filterPlans()">
      <option value="">All statuses</option>
      <option value="review">Review</option>
      <option value="approved">Approved</option>
      <option value="in_progress">In Progress</option>
      <option value="completed">Completed</option>
      <option value="failed">Failed</option>
    </select>
  </div>
</div>

{{stats_html}}

{{categories_html}}

<script>
function toggleCategory(el) {
  const plans = el.nextElementSibling;
  const toggle = el.querySelector('.category-toggle');
  plans.classList.toggle('collapsed');
  toggle.textContent = plans.classList.contains('collapsed') ? '+' : '-';
}
function filterPlans() {
  const q = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  document.querySelectorAll('.plan-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    const cardStatus = card.dataset.status;
    const matchQ = !q || text.includes(q);
    const matchS = !status || cardStatus === status;
    card.style.display = (matchQ && matchS) ? '' : 'none';
  });
  document.querySelectorAll('.category-section').forEach(sec => {
    const visible = sec.querySelectorAll('.plan-card[style=""], .plan-card:not([style])');
    const hidden = sec.querySelectorAll('.plan-card[style*="none"]');
    sec.style.display = (visible.length === 0 && hidden.length > 0) ? 'none' : '';
  });
}
</script>

</body>
</html>
