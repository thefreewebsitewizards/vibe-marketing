<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelBot — Review Queue</title>
<meta name="description" content="ReelBot review queue — rapidly approve or skip plans.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
    line-height: 1.6; padding: 16px;
    max-width: 700px; margin: 0 auto;
  }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1 { font-size: 1.4rem; color: #f8fafc; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .back-btn {
    background: #475569; color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
    text-decoration: none;
  }
  .back-btn:hover { background: #64748b; text-decoration: none; }
  .counter { color: #94a3b8; font-size: 0.85rem; }

  .plan-card {
    background: #1e293b; border-radius: 8px; padding: 16px;
    margin-bottom: 12px; border: 1px solid #334155;
    transition: opacity 0.3s;
  }
  .plan-card.resolved { animation: fadeOut 0.4s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; height: 0; padding: 0; margin: 0; border: 0; overflow: hidden; } }
  .plan-title { font-weight: 700; color: #f8fafc; font-size: 1rem; margin-bottom: 4px; }
  .plan-summary {
    color: #cbd5e1; font-size: 0.85rem; margin-bottom: 8px;
    line-height: 1.5;
  }
  .plan-rec {
    color: #60a5fa; font-size: 0.8rem; margin-bottom: 10px;
    border-left: 3px solid #3b82f6; padding-left: 10px;
  }
  .plan-rec-label { color: #64748b; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .plan-meta { color: #64748b; font-size: 0.75rem; margin-bottom: 8px; }
  .plan-meta a { color: #64748b; }
  .plan-meta a:hover { color: #94a3b8; }
  .video-embed {
    display: none; margin: 8px 0; border-radius: 8px; overflow: hidden;
    max-width: 400px;
  }
  .video-embed.open { display: block; }
  .video-embed iframe { width: 100%; height: 480px; border: none; border-radius: 8px; }

  .task-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .task-check {
    width: 18px; height: 18px; border-radius: 3px; border: 2px solid #475569;
    flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
  }
  .task-check.checked { background: #22c55e; border-color: #22c55e; }
  .task-check-mark { display: none; color: #fff; font-size: 11px; font-weight: 700; }
  .task-check.checked .task-check-mark { display: block; }
  .task-text { font-size: 0.85rem; color: #cbd5e1; flex: 1; }
  .task-level {
    font-size: 0.65rem; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0;
  }
  .tl-1 { background: #334155; color: #94a3b8; }
  .tl-2 { background: #1e3a5f; color: #60a5fa; }
  .tl-3 { background: #3b1764; color: #a78bfa; }
  .task-text { cursor: pointer; }
  .task-desc {
    font-size: 0.78rem; color: #94a3b8; margin: 2px 0 6px 26px;
    line-height: 1.5; display: none; padding: 6px 10px;
    background: #0f172a; border-radius: 4px; border-left: 2px solid #334155;
  }
  .task-desc.open { display: block; }
  .ct-badge {
    font-size: 0.6rem; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .ct-addition { background: #064e3b; color: #6ee7b7; }
  .ct-replacement { background: #7c2d12; color: #fdba74; }
  .ct-reinforcement { background: #1e3a5f; color: #93c5fd; }

  .quick-btns { display: flex; gap: 6px; margin: 8px 0 4px; flex-wrap: wrap; }
  .qb {
    padding: 3px 8px; border: 1px solid #334155; border-radius: 4px;
    background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.7rem;
    transition: all 0.15s;
  }
  .qb:hover { border-color: #64748b; color: #e2e8f0; }

  .action-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .btn {
    padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer;
    font-weight: 600; font-size: 0.85rem; color: #fff; transition: all 0.15s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-approve { background: #22c55e; }
  .btn-skip { background: #64748b; }
  .btn-redo { background: #f59e0b; }
  .btn-view { background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 8px 12px; }
  .btn-view:hover { border-color: #64748b; color: #e2e8f0; }
  .status-msg { color: #94a3b8; font-size: 0.8rem; margin-left: auto; }
  .notes-input {
    width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 4px;
    color: #e2e8f0; padding: 6px 8px; font-size: 0.8rem; margin-top: 8px;
    font-family: inherit; display: none;
  }
  .notes-input::placeholder { color: #475569; }
  .notes-toggle {
    background: none; border: none; color: #475569; font-size: 0.75rem;
    cursor: pointer; padding: 0; margin-top: 6px;
  }
  .notes-toggle:hover { color: #94a3b8; }
  .spinner {
    display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { color: #64748b; text-align: center; padding: 60px 20px; }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .plan-card { padding: 12px; }
    .action-row { flex-wrap: wrap; }
    .btn { flex: 1; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Review Queue</h1>
  <span class="counter" id="counter"></span>
  <a href="/" class="back-btn">Dashboard</a>
</div>

<div id="queue"></div>
<div class="empty-state" id="empty" style="display:none;">No plans to review. Send some reels!</div>

<div id="failed-section" style="display:none;">
  <div style="margin-top:24px;padding-top:16px;border-top:1px solid #334155;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h2 style="font-size:1.1rem;color:#ef4444;">Failed</h2>
      <span class="counter" id="failed-counter" style="color:#ef4444;"></span>
    </div>
  </div>
  <div id="failed-queue"></div>
</div>

<script>
var plans = {{plans_json}};
var failedPlans = {{failed_json}};

function renderFailed() {
  var section = document.getElementById('failed-section');
  var fq = document.getElementById('failed-queue');
  if (!failedPlans.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  document.getElementById('failed-counter').textContent = failedPlans.length + ' failed';

  fq.innerHTML = failedPlans.map(function(p, fi) {
    var err = p.error_detail || 'Unknown error';
    var metaParts = [];
    if (p.creator) metaParts.push(esc(p.creator));
    if (p.category) metaParts.push(esc(p.category));
    if (p.source_url) metaParts.push('<a href="' + esc(p.source_url) + '" target="_blank">watch video</a>');

    return '<div class="plan-card" style="border-color:#7f1d1d;">' +
      '<div class="plan-title">' + esc(p.title) + '</div>' +
      '<div class="plan-meta">' + metaParts.join(' &middot; ') + '</div>' +
      (p.summary ? '<div class="plan-summary">' + esc(p.summary) + '</div>' : '') +
      '<div style="color:#fca5a5;font-size:0.8rem;margin:6px 0;padding:6px 10px;background:#1c1010;border-radius:4px;border-left:2px solid #ef4444;">' + esc(err) + '</div>' +
      '<div class="action-row">' +
        '<a class="btn btn-view" href="/plans/' + p.reel_id + '/view" target="_blank">View details</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function render() {
  var q = document.getElementById('queue');
  var pending = plans.filter(function(p) { return !p._resolved; });
  document.getElementById('counter').textContent = pending.length + ' to review';
  document.getElementById('empty').style.display = plans.length === 0 ? '' : 'none';

  q.innerHTML = plans.map(function(p, pi) {
    var cls = 'plan-card' + (p._resolved ? ' resolved' : '');
    var tasks = p.tasks || [];
    var levelNames = {1: 'Note', 2: 'Build', 3: 'Deep'};
    var ctLabels = {addition: '+new', replacement: 'replace', reinforcement: 'reinforce'};
    var taskHtml = tasks.map(function(t, ti) {
      var checked = p._selected && p._selected.has(ti) ? ' checked' : '';
      var lvl = t.level || 1;
      var tools = (t.tools||[]).join(', ');
      var ct = t.change_type || '';
      var ctHtml = ct && ctLabels[ct] ? ' <span class="ct-badge ct-' + ct + '">' + ctLabels[ct] + '</span>' : '';
      var desc = t.description || '';
      if (!p._expanded) p._expanded = new Set();
      var isExpanded = p._expanded.has(ti);
      return '<div class="task-row">' +
        '<div class="task-check' + checked + '" onclick="toggleTask(' + pi + ',' + ti + ')">' +
        '<span class="task-check-mark">&#10003;</span></div>' +
        '<span class="task-level tl-' + lvl + '">' + (levelNames[lvl] || 'L'+lvl) + '</span>' +
        ctHtml +
        '<span class="task-text" onclick="toggleDesc(' + pi + ',' + ti + ')">' + esc(t.title) + (tools ? ' <span style="color:#64748b">(' + tools + ')</span>' : '') + '</span>' +
        '</div>' +
        (desc ? '<div class="task-desc' + (isExpanded ? ' open' : '') + '">' + esc(desc) + '</div>' : '');
    }).join('');

    var statusHtml = p._status ? '<span class="status-msg">' + p._status + '</span>' : '';

    var metaParts = [];
    if (p.creator) metaParts.push(esc(p.creator));
    if (p.category) metaParts.push(esc(p.category));
    metaParts.push((p.relevance_score * 100).toFixed(0) + '%');
    if (p.source_url) metaParts.push('<a href="#" onclick="toggleVideo(' + pi + ');return false;">watch video</a>');

    if (!p._videoOpen) p._videoOpen = false;
    var embedUrl = p.source_url ? p.source_url.replace(/\/$/, '') + '/embed/' : '';
    var videoHtml = embedUrl ?
      '<div class="video-embed' + (p._videoOpen ? ' open' : '') + '" id="video-' + pi + '">' +
        (p._videoOpen ? '<iframe src="' + esc(embedUrl) + '" allowfullscreen></iframe>' : '') +
      '</div>' : '';

    return '<div class="' + cls + '" id="plan-' + pi + '">' +
      '<div class="plan-title">' + esc(p.title) + '</div>' +
      '<div class="plan-meta">' + metaParts.join(' &middot; ') + '</div>' +
      videoHtml +
      (p.summary ? '<div class="plan-summary">' + esc(p.summary) + '</div>' : '') +
      (p.recommended_action ? '<div class="plan-rec"><span class="plan-rec-label">Why it matters </span>' + esc(p.recommended_action) + '</div>' : '') +
      taskHtml +
      '<div class="quick-btns">' +
        '<button class="qb" onclick="selectLevel(' + pi + ',1)">L1</button>' +
        '<button class="qb" onclick="selectLevel(' + pi + ',2)">L1+L2</button>' +
        '<button class="qb" onclick="selectLevel(' + pi + ',3)">All</button>' +
        '<button class="qb" onclick="selectNone(' + pi + ')">Clear</button>' +
      '</div>' +
      '<button class="notes-toggle" onclick="toggleNotes(' + pi + ')">+ add notes</button>' +
      '<input class="notes-input" id="notes-' + pi + '"' +
        ' value="' + esc(p._notes || '') + '"' +
        ' style="display:' + (p._notesOpen ? 'block' : 'none') + '"' +
        ' oninput="plans[' + pi + ']._notes=this.value"' +
        ' placeholder="Optional notes (conditions, changes, context...)">' +
      '<div class="action-row">' +
        '<button class="btn btn-approve" id="approve-' + pi + '" onclick="approve(' + pi + ')">Approve</button>' +
        '<button class="btn btn-redo" id="redo-' + pi + '" onclick="redo(' + pi + ')">Redo</button>' +
        '<button class="btn btn-skip" onclick="skip(' + pi + ')">Skip</button>' +
        '<a class="btn btn-view" href="/plans/' + p.reel_id + '/view" target="_blank">Full plan</a>' +
        statusHtml +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleTask(pi, ti) {
  if (plans[pi]._resolved) return;
  if (!plans[pi]._selected) plans[pi]._selected = new Set();
  if (plans[pi]._selected.has(ti)) plans[pi]._selected.delete(ti);
  else plans[pi]._selected.add(ti);
  render();
}

function selectLevel(pi, maxLevel) {
  if (plans[pi]._resolved) return;
  plans[pi]._selected = new Set();
  (plans[pi].tasks || []).forEach(function(t, ti) {
    if ((t.level || 1) <= maxLevel) plans[pi]._selected.add(ti);
  });
  render();
}

function selectNone(pi) {
  plans[pi]._selected = new Set();
  render();
}

function toggleVideo(pi) {
  plans[pi]._videoOpen = !plans[pi]._videoOpen;
  render();
}

function toggleDesc(pi, ti) {
  if (!plans[pi]._expanded) plans[pi]._expanded = new Set();
  if (plans[pi]._expanded.has(ti)) plans[pi]._expanded.delete(ti);
  else plans[pi]._expanded.add(ti);
  render();
}

function toggleNotes(pi) {
  plans[pi]._notesOpen = !plans[pi]._notesOpen;
  render();
  if (plans[pi]._notesOpen) {
    var el = document.getElementById('notes-' + pi);
    if (el) { el.focus(); el.selectionStart = el.value.length; }
  }
}

async function approve(pi) {
  var p = plans[pi];
  var sel = p._selected ? Array.from(p._selected) : [];
  if (sel.length === 0) { selectLevel(pi, 2); sel = Array.from(plans[pi]._selected); }
  var notes = p._notes || '';

  var btn = document.getElementById('approve-' + pi);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Approving...';

  try {
    var res = await fetch('/plans/' + p.reel_id + '/approve', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ selected_tasks: sel, notes: notes }),
    });
    if (res.ok) {
      p._resolved = true;
      p._status = 'Approved ' + sel.length + ' task(s)';
    } else {
      var err = await res.json();
      p._status = 'Error: ' + (err.detail || res.statusText);
      btn.disabled = false;
      btn.textContent = 'Approve';
    }
  } catch(e) {
    p._status = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Approve';
  }
  render();
}

async function redo(pi) {
  var p = plans[pi];
  var notes = p._notes || '';
  if (!notes) {
    plans[pi]._notesOpen = true;
    render();
    var el = document.getElementById('notes-' + pi);
    if (el) { el.focus(); el.placeholder = 'Add notes for what to change, then click Redo again'; }
    return;
  }

  var btn = document.getElementById('redo-' + pi);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Redoing...';

  try {
    var res = await fetch('/plans/' + p.reel_id + '/redo', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ notes: notes }),
    });
    if (res.ok) {
      p._resolved = true;
      p._status = 'Regenerating with notes...';
    } else {
      var err = await res.json();
      p._status = 'Error: ' + (err.detail || res.statusText);
      btn.disabled = false;
      btn.textContent = 'Redo';
    }
  } catch(e) {
    p._status = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Redo';
  }
  render();
}

async function skip(pi) {
  var p = plans[pi];
  var reason = p._notes || '';
  try {
    var res = await fetch('/plans/' + p.reel_id + '/skip', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ reason: reason }),
    });
    if (res.ok) {
      p._resolved = true;
      p._status = reason ? 'Skipped: ' + reason.substring(0, 40) : 'Skipped';
    }
  } catch(e) {}
  render();
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

render();
renderFailed();
</script>
</body>
</html>
